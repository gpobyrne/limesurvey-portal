<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <title>UHL CSAR-AI Portal</title>

  <meta name="description" content="Access portal for the UHL CSAR-AI Study Human Healthcare Worker Survey.">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta property="og:title" content="UHL CSAR-AI Study Survey Portal">
  <meta property="og:type" content="website">
  <meta property="og:description" content="Access portal for the UHL CSAR-AI Human Healthcare Worker Survey.">
  <meta property="og:url" content="https://uhl-research.site/">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="UHL CSAR-AI Study Survey Portal">

  <link rel="canonical" href="https://uhl-research.site/">

  <style>
    :root {
      --sidebar-bg: #f7f7f7;
      --sidebar-border: #e2e2e2;
      --main-bg: #ffffff;
      --text: #222222;
      --muted: #666666;
      --link: #0057b8;
      --link-hover: #003f87;
      --accent: #0057b8;
      --accent-light: #eaf2ff;
      --border: #dddddd;
      --warning-bg: #fff7e8;
      --warning-border: #a15c00;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--main-bg);
      line-height: 1.65;
    }

    a {
      color: var(--link);
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      color: var(--link-hover);
      text-decoration: underline;
    }

    .book {
      display: flex;
      min-height: 100vh;
    }

    /*
      Decorative Bookdown-style sidebar.
      Intentionally contains no visible text.
    */
    .book-summary {
      width: 72px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
    }

    .book-summary::before {
      content: "";
      display: block;
      width: 28px;
      height: 28px;
      margin: 1.5rem auto 0 auto;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.9;
    }

    .book-summary::after {
      content: "";
      display: block;
      width: 32px;
      height: 2px;
      margin: 1.2rem auto 0 auto;
      background: var(--sidebar-border);
      box-shadow:
        0 10px 0 var(--sidebar-border),
        0 20px 0 var(--sidebar-border),
        0 30px 0 var(--sidebar-border);
    }

    .book-body {
      margin-left: 72px;
      width: calc(100% - 72px);
      min-height: 100vh;
      background: var(--main-bg);
    }

    .page-wrapper {
      max-width: 920px;
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
    }

    .page-title {
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .page-title h1 {
      margin: 0 0 0.5rem 0;
      font-size: clamp(2.2rem, 4vw, 3.4rem);
      line-height: 1.1;
    }

    .date {
      margin: 0;
      color: var(--muted);
      font-style: italic;
    }

    section {
      margin: 3rem 0;
      padding-bottom: 1.7rem;
      border-bottom: 1px solid #eeeeee;
    }

    section:last-of-type {
      border-bottom: none;
    }

    h2 {
      font-size: 1.8rem;
      margin-bottom: 0.75rem;
      line-height: 1.2;
    }

    p {
      font-size: 1.03rem;
    }

    .callout {
      border-left: 4px solid var(--accent);
      background: var(--accent-light);
      padding: 1rem 1.25rem;
      border-radius: 8px;
      margin: 1.5rem 0;
    }

    .study-info-table {
      width: 100%;
      border-collapse: collapse;
      margin: 2rem 0;
      font-size: 1rem;
      border: 1px solid var(--border);
    }

    .study-info-table th,
    .study-info-table td {
      padding: 0.9rem 1rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      text-align: left;
    }

    .study-info-table th {
      width: 28%;
      background: var(--accent-light);
      color: var(--text);
      font-weight: 700;
    }

    .study-info-table tr:last-child th,
    .study-info-table tr:last-child td {
      border-bottom: none;
    }

    @media (max-width: 640px) {
      .study-info-table,
      .study-info-table tbody,
      .study-info-table tr,
      .study-info-table th,
      .study-info-table td {
        display: block;
        width: 100%;
      }

      .study-info-table th {
        border-bottom: none;
      }

      .study-info-table td {
        border-bottom: 1px solid var(--border);
      }
    }

    .warning {
      border-left-color: var(--warning-border);
      background: var(--warning-bg);
    }

    .pdf-link {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-weight: 700;
      margin-top: 0.5rem;
    }

    .survey-action {
      text-align: center;
      margin: 2.5rem 0 1rem;
    }

    .button-primary {
      display: inline-block;
      padding: 1rem 1.5rem;
      border-radius: 10px;
      background: var(--accent);
      color: #ffffff;
      font-weight: 700;
      border: 1px solid transparent;
      box-shadow: 0 8px 20px rgba(0, 87, 184, 0.22);
    }

    .button-primary:hover {
      background: var(--link-hover);
      color: #ffffff;
      text-decoration: none;
    }

    @media (max-width: 860px) {
      .book {
        display: block;
      }

      .book-summary {
        display: none;
      }

      .book-body {
        margin-left: 0;
        width: 100%;
      }

      .page-wrapper {
        padding: 2rem 1.25rem 4rem;
      }
    }
  </style>
</head>

<body>
  <div class="book">

    <aside class="book-summary" aria-hidden="true"></aside>

    <main class="book-body">
      <div class="page-wrapper" tabindex="-1" role="main">
        <article>

          <div class="page-title" id="uhl-research-survey-portal">
            <h1>UHL CSAR-AI Study</h1>
            <p class="date">Last updated: 15 June 2026</p>
          </div>
